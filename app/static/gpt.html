<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>RISC-V Binary Intelligence — Upload</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-white bg-white border-bottom mb-4">
        <div class="container">
            <a class="navbar-brand" href="#">RISC-V Binary Intelligence</a>
            <div class="d-flex">
                <a class="btn btn-outline-secondary btn-sm" href="/static/result.html" id="navResult">View Result</a>
            </div>
        </div>
    </nav>

    <main class="container">
        <div class="card shadow-sm">
            <div class="card-body">
                <h3 class="card-title">Analyze a binary</h3>
                <p class="text-muted">Select exactly one binary file for analysis. The session stores the result locally so you can open the result page.</p>

                <div class="row g-2 align-items-center">
                    <div class="col-md-7">
                        <input id="fileInput" class="form-control" type="file" accept="*/*" />
                    </div>
                    <div class="col-md-5 d-flex gap-2">
                        <button id="analyzeBtn" class="btn btn-primary">Analyze</button>
                        <button id="newBtn" class="btn btn-outline-secondary">New Session</button>
                    </div>
                </div>

                <div id="status" class="mt-3 small text-muted"></div>
            </div>
        </div>
        <div class="text-center mt-3 small text-muted">Powered by FastAPI · Local session storage · Single file per session</div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const fileInput = document.getElementById('fileInput');
        const analyzeBtn = document.getElementById('analyzeBtn');
        const newBtn = document.getElementById('newBtn');
        const status = document.getElementById('status');

        function setStatus(msg){ status.textContent = msg; }

        function disableUI(flag){ if(flag) { analyzeBtn.classList.add('disabled'); fileInput.disabled = true; } else { analyzeBtn.classList.remove('disabled'); fileInput.disabled = false; } }

        // Restore state: if a result exists, offer to view it
        if (sessionStorage.getItem('rbi_result')) {
            setStatus('A previous analysis result exists. Click "New Session" to analyze a different file or View Result to open the result page.');
            document.getElementById('navResult').classList.remove('d-none');
            disableUI(true);
        } else {
            // hide nav result button when none exists
            document.getElementById('navResult').classList.add('d-none');
        }

        newBtn.addEventListener('click', () => {
            sessionStorage.removeItem('rbi_result');
            setStatus('Cleared session. You can upload a new file now.');
            disableUI(false);
            // remove view button if present
            document.getElementById('navResult').classList.add('d-none');
        });

        analyzeBtn.addEventListener('click', async () => {
            const file = fileInput.files[0];
            if (!file) return alert('Please select a file');
            // enforce one file per session
            if (sessionStorage.getItem('rbi_result')) return alert('A result already exists in this session. Click New Session to start over.');

            setStatus('Uploading and analyzing...');
            disableUI(true);

            try {
                const fd = new FormData();
                fd.append('file', file, file.name);
                const resp = await fetch('/api/analyze', { method: 'POST', body: fd });
                if (!resp.ok) {
                    const txt = await resp.text();
                    throw new Error(txt || resp.statusText || 'Server error');
                }
                const json = await resp.json();
                // store result and navigate to result page
                try { sessionStorage.setItem('rbi_result', JSON.stringify(json)); } catch(e) { console.warn('Could not store session result', e); }
                // show result button in navbar then navigate
                document.getElementById('navResult').classList.remove('d-none');
                location.href = '/static/result.html';
            } catch (err) {
                console.error(err);
                setStatus('Error: ' + (err.message || String(err)));
                disableUI(false);
            }
        });
    </script>
</body>
</html>
