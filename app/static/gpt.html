<!doctype html>
<html lang="en">
<hea
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>RISC-V Binary Intelligence — Upload</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #080c14;
      --surface: #0d1220;
      --surface2: #131929;
      --border: rgba(99,132,255,0.12);
      --border-active: rgba(99,132,255,0.5);
      --accent: #4f7dff;
      --accent2: #7b5cfa;
      --accent-glow: rgba(79,125,255,0.22);
      --text: #e8eaf6;
      --text-muted: #6b7280;
      --text-dim: #3d4558;
      --success: #22c55e;
      --danger: #ef4444;
      --mono: 'Space Mono', monospace;
      --sans: 'DM Sans', sans-serif;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      font-size: 15px;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }

    body::before {
      content: '';
      position: fixed; inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 10% 0%, rgba(79,125,255,0.07) 0%, transparent 60%),
        radial-gradient(ellipse 60% 50% at 90% 100%, rgba(123,92,250,0.06) 0%, transparent 60%);
      pointer-events: none; z-index: 0;
    }

    body::after {
      content: '';
      position: fixed; inset: 0;
      background-image:
        linear-gradient(rgba(99,132,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(99,132,255,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none; z-index: 0;
    }

    .page {
      position: relative; z-index: 1;
      min-height: 100vh;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 40px 20px;
    }

    /* Header */
    .header {
      text-align: center;
      margin-bottom: 48px;
      animation: fadeUp 0.5s ease both;
    }

    .logo {
      display: inline-flex; align-items: center; gap: 10px;
      font-family: var(--mono); font-size: 11px; font-weight: 700;
      letter-spacing: 0.2em; color: var(--accent);
      text-transform: uppercase; text-decoration: none;
      margin-bottom: 20px;
    }

    .logo-icon {
      width: 28px; height: 28px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px;
    }

    h1 {
      font-size: clamp(22px, 4vw, 34px);
      font-weight: 600; letter-spacing: -0.02em;
      color: var(--text); margin-bottom: 10px;
    }

    .subtitle { color: var(--text-muted); font-size: 14px; font-weight: 300; }

    /* Card */
    .upload-card {
      width: 100%; max-width: 520px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px; padding: 32px;
      animation: fadeUp 0.5s ease 0.1s both;
    }

    /* File row */
    .file-row {
      display: flex; align-items: center; gap: 10px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 12px; padding: 10px 14px;
      transition: border-color 0.2s;
      margin-bottom: 16px;
      cursor: pointer;
      position: relative;
      overflow: hidden;
    }

    .file-row:hover { border-color: var(--border-active); }

    .file-row input[type="file"] {
      position: absolute; inset: 0;
      opacity: 0; cursor: pointer;
      font-size: 0;
    }

    .file-row-icon {
      width: 36px; height: 36px; flex-shrink: 0;
      background: rgba(79,125,255,0.1);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px;
    }

    .file-row-text { flex: 1; min-width: 0; }
    .file-row-label { font-size: 13px; font-weight: 500; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .file-row-hint { font-size: 11px; font-family: var(--mono); color: var(--text-muted); }

    .file-row-btn {
      font-size: 11px; font-family: var(--mono); font-weight: 700;
      letter-spacing: 0.06em; color: var(--accent);
      padding: 4px 10px; border-radius: 6px;
      background: rgba(79,125,255,0.1);
      border: 1px solid rgba(79,125,255,0.2);
      flex-shrink: 0;
      pointer-events: none;
    }

    /* Analyze btn */
    .btn-analyze {
      width: 100%;
      padding: 12px 24px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #fff; border: none; border-radius: 12px;
      font-family: var(--sans); font-size: 15px; font-weight: 600;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 8px;
      box-shadow: 0 4px 20px rgba(79,125,255,0.25);
      transition: all 0.2s ease;
    }

    .btn-analyze:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 8px 32px rgba(79,125,255,0.4);
    }

    .btn-analyze:active:not(:disabled) { transform: translateY(0); }

    .btn-analyze:disabled {
      opacity: 0.55; cursor: not-allowed;
      transform: none !important;
    }

    /* Status */
    .status-area {
      margin-top: 16px;
      min-height: 24px;
      display: flex; align-items: center; gap: 8px;
      font-size: 13px; font-family: var(--mono);
      color: var(--text-muted);
    }

    .status-error { color: var(--danger); }
    .status-ok { color: var(--success); }

    /* Divider */
    .info-row {
      margin-top: 20px;
      padding-top: 18px;
      border-top: 1px solid var(--border);
      display: flex; gap: 16px; flex-wrap: wrap;
    }

    .info-chip {
      display: flex; align-items: center; gap: 6px;
      font-size: 11px; font-family: var(--mono);
      color: var(--text-dim);
    }

    .info-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--accent); opacity: 0.5;
    }

    /* Footer */
    .footer {
      margin-top: 36px;
      font-size: 11px; font-family: var(--mono);
      letter-spacing: 0.05em; color: var(--text-dim);
      animation: fadeUp 0.5s ease 0.3s both;
    }

    /* Spinner */
    .spin {
      display: inline-block;
      width: 14px; height: 14px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div class="page">

    <div class="header">
      <a class="logo" href="#">
        <span class="logo-icon">⬡</span>
        RISC-V Binary Intelligence
      </a>
      <h1>Analyze a Binary</h1>
      <p class="subtitle">Upload a RISC-V binary for static analysis. Results expire after first fetch.</p>
    </div>

    <div class="upload-card">

      <label class="file-row" id="fileRow">
        <div class="file-row-icon" id="fileIcon">📂</div>
        <div class="file-row-text">
          <div class="file-row-label" id="fileLabel">No file selected</div>
          <div class="file-row-hint" id="fileHint">ELF · BIN · .o · .out · any binary</div>
        </div>
        <span class="file-row-btn">Browse</span>
        <input id="fileInput" type="file" accept="*/*" />
      </label>

      <button id="analyzeBtn" class="btn-analyze">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        Analyze Binary
      </button>

      <div class="status-area" id="statusArea"></div>

      <div class="info-row">
        <div class="info-chip"><span class="info-dot"></span>FastAPI backend</div>
        <div class="info-chip"><span class="info-dot"></span>Server-side analysis</div>
        <div class="info-chip"><span class="info-dot"></span>Single-use results</div>
      </div>

    </div>

    <div class="footer">RISC-V BINARY INTELLIGENCE &nbsp;·&nbsp; STATIC + DYNAMIC ANALYSIS</div>
  </div>

  <script>
    const fileInput  = document.getElementById('fileInput');
    const analyzeBtn = document.getElementById('analyzeBtn');
    const statusArea = document.getElementById('statusArea');
    const fileLabel  = document.getElementById('fileLabel');
    const fileHint   = document.getElementById('fileHint');
    const fileIcon   = document.getElementById('fileIcon');
    const fileRow    = document.getElementById('fileRow');

    const icons = { elf:'🔩', bin:'🗜', o:'📦', out:'⚙️' };

    fileInput.addEventListener('change', () => {
      const f = fileInput.files[0];
      if (!f) return;
      const ext = f.name.split('.').pop().toLowerCase();
      fileIcon.textContent = icons[ext] || '📄';
      fileLabel.textContent = f.name;
      fileHint.textContent = formatBytes(f.size);
      fileRow.style.borderColor = 'rgba(79,125,255,0.4)';
      setStatus('');
    });

    function formatBytes(b) {
      if (b < 1024) return b + ' B';
      if (b < 1024 * 1024) return (b / 1024).toFixed(1) + ' KB';
      return (b / 1024 / 1024).toFixed(2) + ' MB';
    }

    function setStatus(msg, type) {
      if (!msg) { statusArea.innerHTML = ''; return; }
      const cls = type === 'error' ? 'status-error' : type === 'ok' ? 'status-ok' : '';
      const icon = type === 'loading' ? '<span class="spin"></span>' : type === 'error' ? '✗' : type === 'ok' ? '✓' : '›';
      statusArea.innerHTML = `<span>${icon}</span><span class="${cls}">${msg}</span>`;
    }

    function setLoading(flag) {
      analyzeBtn.disabled = flag;
      fileInput.disabled = flag;
      if (flag) {
        analyzeBtn.innerHTML = '<span class="spin"></span> Analyzing…';
      } else {
        analyzeBtn.innerHTML = '<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg> Analyze Binary';
      }
    }

    analyzeBtn.addEventListener('click', async () => {
      const file = fileInput.files[0];
      if (!file) {
        setStatus('Please select a file first.', 'error');
        fileRow.style.borderColor = 'rgba(239,68,68,0.5)';
        setTimeout(() => { fileRow.style.borderColor = ''; }, 1200);
        return;
      }

      setStatus('Uploading and analyzing…', 'loading');
      setLoading(true);

      try {
        const fd = new FormData();
        fd.append('file', file, file.name);
        const resp = await fetch('/api/analyze', { method: 'POST', body: fd });
        if (!resp.ok) {
          const txt = await resp.text();
          throw new Error(txt || resp.statusText || 'Server error');
        }
        const json = await resp.json();
        if (json && json.id) {
          setStatus('Analysis complete — redirecting…', 'ok');
          setTimeout(() => { location.href = '/result/' + json.id; }, 400);
        } else {
          throw new Error('Unexpected server response');
        }
      } catch (err) {
        console.error(err);
        setStatus('Error: ' + (err.message || String(err)), 'error');
        setLoading(false);
      }
    });
  </script>
</body>
</html>
disableUI(false);
            }
        });
    </script>
</body>
</html>
