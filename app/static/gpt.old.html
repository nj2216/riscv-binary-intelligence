<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>RISC-V Binary Intelligence — Upload</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-white bg-white border-bottom mb-4">
        <div class="container">
            <a class="navbar-brand" href="#">RISC-V Binary Intelligence</a>
        </div>
    </nav>

    <main class="container">
        <div class="card shadow-sm">
            <div class="card-body">
                <h3 class="card-title">Analyze a binary</h3>
                <p class="text-muted">Select one binary file for analysis. The server stores results temporarily.</p>

                <div class="row g-2 align-items-center">
                    <div class="col-md-7">
                        <input id="fileInput" class="form-control" type="file" accept="*/*" />
                    </div>
                    <div class="col-md-5 d-flex gap-2">
                        <button id="analyzeBtn" class="btn btn-primary">Analyze</button>
                    </div>
                </div>

                <div id="status" class="mt-3 small text-muted"></div>
            </div>
        </div>
        <div class="text-center mt-3 small text-muted">Powered by FastAPI · Server-side analysis · Results auto-expire after first fetch</div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const fileInput = document.getElementById('fileInput');
        const analyzeBtn = document.getElementById('analyzeBtn');
        const status = document.getElementById('status');

        function setStatus(msg){ status.textContent = msg; }

        function disableUI(flag){ if(flag) { analyzeBtn.classList.add('disabled'); fileInput.disabled = true; } else { analyzeBtn.classList.remove('disabled'); fileInput.disabled = false; } }


        analyzeBtn.addEventListener('click', async () => {
            const file = fileInput.files[0];
            if (!file) return alert('Please select a file');
            // enforce one file per session

            setStatus('Uploading and analyzing...');
            disableUI(true);

            try {
                const fd = new FormData();
                fd.append('file', file, file.name);
                const resp = await fetch('/api/analyze', { method: 'POST', body: fd });
                if (!resp.ok) {
                    const txt = await resp.text();
                    throw new Error(txt || resp.statusText || 'Server error');
                }
                const json = await resp.json();
                // Navigate to result page using the server-provided id
                if (json && json.id) {
                    location.href = '/result/' + json.id;
                } else {
                    throw new Error('Unexpected server response');
                }
            } catch (err) {
                console.error(err);
                setStatus('Error: ' + (err.message || String(err)));
                disableUI(false);
            }
        });
    </script>
</body>
</html>
