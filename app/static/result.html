<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>RISC-V Binary Intelligence — Result</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body{background:#f8f9fa}
    .badge-stat{background:#eef;padding:6px 10px;border-radius:6px;font-size:13px;margin-right:6px}
    .bar{height:12px;background:#e9ecef;border-radius:6px;overflow:hidden}
    .bar > i{display:block;height:100%;background:#0d6efd}
  </style>
</head>
<body>
  <nav class="navbar navbar-light bg-white border-bottom mb-3">
    <div class="container">
      <a class="navbar-brand" href="/">RISC-V Binary Intelligence</a>
      <div>
        <button class="btn btn-outline-secondary btn-sm me-2" id="copyBtn">Copy JSON</button>
        <button class="btn btn-outline-secondary btn-sm me-2" id="downloadBtn">Download JSON</button>
        <button class="btn btn-outline-secondary btn-sm" id="rawBtn">Toggle Raw JSON</button>
      </div>
    </div>
  </nav>

  <main class="container">
    <div id="content">
      <div class="row g-3">
        <div class="col-lg-8">
          <div class="card">
            <div class="card-body">
              <h5 class="card-title">Metadata</h5>
              <div id="meta" class="text-muted"></div>

              <h5 class="mt-3">Instruction Summary</h5>
              <div id="stats" class="mb-2"></div>

              <h5 class="mt-3">Heuristics</h5>
              <div id="heuristics" class="text-muted"></div>

              <h5 class="mt-3">Recommendations</h5>
              <div id="recs" class="text-muted">(none)</div>
            </div>
          </div>
        </div>

        <div class="col-lg-4">
          <div class="card">
            <div class="card-body">
              <h6>Sections</h6>
              <div class="table-responsive" style="max-height:420px;overflow:auto">
                <table class="table table-sm" id="sectionsTable"><thead><tr><th>Name</th><th>Size</th><th>Addr</th></tr></thead><tbody></tbody></table>
              </div>

              <h6 class="mt-3">Instruction Percentages</h6>
              <div id="percentages"></div>
            </div>
          </div>
        </div>
      </div>

      <div id="raw" class="card mt-3" style="display:none">
        <div class="card-body"><h6>Raw JSON</h6><pre id="rawPre" class="small"></pre></div>
      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    // Extract id from path and fetch report from the server.
    const pathParts = window.location.pathname.split('/').filter(Boolean);
    const rid = pathParts[pathParts.length - 1];
    if (!rid) {
      document.getElementById('content').innerHTML = '<div class="card"><p>Missing result id in URL.</p></div>';
    } else {
      fetch('/api/result/' + encodeURIComponent(rid)).then(async resp => {
          if (!resp.ok) {
            const txt = await resp.text();
            document.getElementById('content').innerHTML = '<div class="card"><p>Could not retrieve result: ' + (txt || resp.statusText) + '</p></div>';
            return;
          }
          const data = await resp.json();
          // Metadata
          const meta = data.metadata || {};
        const metaParts = [];
        for (const k of ['arch','arch_string','entry_point','bits','endianness']) {
          if (meta[k] !== undefined) metaParts.push('<strong>'+k+':</strong> ' + escapeHtml(String(meta[k])));
        }
        document.getElementById('meta').innerHTML = metaParts.join(' · ');

        // Stats badges
        const s = data.instruction_stats || {};
        const statsEl = document.getElementById('stats');
        statsEl.innerHTML = '';
        const addBadge = (txt) => { const b = document.createElement('span'); b.className='badge'; b.innerHTML = txt; statsEl.appendChild(b); };
        addBadge('Total: ' + (s.total ?? '-'));
        addBadge('Loads: ' + (s.loads ?? 0));
        addBadge('Stores: ' + (s.stores ?? 0));
        addBadge('Branches: ' + (s.branches ?? 0));
        addBadge('Arithmetic: ' + (s.arithmetic ?? 0));

        // Heuristics
        const h = data.heuristics || {};
        document.getElementById('heuristics').innerHTML = 'Memory intensity: ' + (h.memory_intensity ?? '-') + ' · Branch density: ' + (h.branch_density ?? '-') + ' · Compute intensity: ' + (h.compute_intensity ?? '-') + ' · Risk: ' + (h.risk_score ?? '-');

        // Recommendations
        const recs = data.recommendations || [];
        document.getElementById('recs').innerHTML = recs.length ? ('<ul>'+recs.map(r=>'<li>'+escapeHtml(String(r))+'</li>').join('')+'</ul>') : '(none)';

        // Sections table
        const tbody = document.querySelector('#sectionsTable tbody');
        (data.sections || []).forEach(sec => {
          const tr = document.createElement('tr');
          const td1 = document.createElement('td'); td1.textContent = sec.name || '(unnamed)';
          const td2 = document.createElement('td'); td2.textContent = sec.size ?? '';
          const td3 = document.createElement('td'); td3.textContent = sec.addr ?? '';
          tr.appendChild(td1); tr.appendChild(td2); tr.appendChild(td3);
          tbody.appendChild(tr);
        });

        // Percentages visualization
        const pctWrap = document.getElementById('percentages');
        pctWrap.innerHTML = '';
        const pct = data.instruction_percentages || {};
        for (const [k,v] of Object.entries(pct)) {
          const label = document.createElement('div'); label.className='small'; label.textContent = k + ': ' + (v ?? '-') + '%';
          const bar = document.createElement('div'); bar.className='bar';
          const inner = document.createElement('i'); inner.style.width = (Math.max(0, Math.min(100, v||0))) + '%';
          bar.appendChild(inner);
          pctWrap.appendChild(label); pctWrap.appendChild(bar);
        }

          // Raw JSON
          document.getElementById('rawPre').textContent = JSON.stringify(data, null, 2);

          // make copy/download/raw buttons use the fetched data
          const jsonStr = JSON.stringify(data, null, 2);
          document.getElementById('copyBtn').addEventListener('click', async () => {
            try { await navigator.clipboard.writeText(jsonStr); alert('Report JSON copied to clipboard'); } catch (e) { alert('Copy failed'); }
          });
          document.getElementById('downloadBtn').addEventListener('click', () => {
            const blob = new Blob([jsonStr], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a'); a.href = url; a.download = 'report.json'; document.body.appendChild(a); a.click(); a.remove(); URL.revokeObjectURL(url);
          });
          document.getElementById('rawBtn').addEventListener('click', () => {
            const el = document.getElementById('raw');
            el.style.display = el.style.display === 'none' ? 'block' : 'none';
          });

        }).catch(err => {
          console.error(err);
          document.getElementById('content').innerHTML = '<div class="card"><p>Error fetching result.</p></div>';
        });
    }




    function escapeHtml(s){ return s.replace(/[&<>"]+/g, c=>({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;' })[c] || c); }
  </script>
</body>
</html>
